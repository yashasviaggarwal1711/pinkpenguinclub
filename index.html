<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Penguin Club</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="logo">🐧</div>
    <h1>Pink Penguin Club</h1>
    <p>A tiny Barbie x Club Penguin world for A • N • Y</p>
    <div class="member-row">
      <button class="member-btn selected" data-member="A">A</button>
      <button class="member-btn" data-member="N">N</button>
      <button class="member-btn" data-member="Y">Y</button>
    </div>
    <input id="codeInput" type="password" placeholder="secret penguin code">
    <button id="loginBtn" class="pink-btn">Enter Island</button>
    <p id="loginMsg"></p>
    <p class="tiny">Codes: A = fishcake, N = snowstar, Y = pinkfish</p>
  </div>
</section>

<section id="gameScreen" class="screen">
  <header class="topbar">
    <div><h1>Pink Penguin Club</h1><p id="whoText"></p></div>
    <div class="stats">
      <span>🪙 <b id="coinText">0</b></span>
      <span>⭐ Lv <b id="levelText">1</b></span>
      <span>✨ XP <b id="xpText">0</b></span>
      <span>👑 <b id="titleText">New Penguin</b></span>
    </div>
  </header>

  <section id="mapView" class="view active">
    <div class="image-stage map-stage">
      <img src="assets/map.png" alt="Pink Penguin Club map">
      <button class="hotspot dream" data-room="dream">Dream Lodge</button>
      <button class="hotspot cafe" data-room="cafe">Café</button>
      <button class="hotspot mall" data-room="mall">Mall</button>
      <button class="hotspot fortune" data-room="fortune">Fortune</button>
      <button class="hotspot hall" data-room="hall">Hall</button>
      <button class="hotspot times" data-room="times">Times</button>
    </div>
    <nav class="nav-buttons">
      <button data-room="dream">🏰 Dream Lodge</button>
      <button data-room="cafe">☕ Café</button>
      <button data-room="mall">🎀 Mall</button>
      <button data-room="fortune">🔮 Fortune</button>
      <button data-room="hall">🏆 Hall</button>
      <button data-room="times">📰 Times</button>
    </nav>
  </section>

  <section id="roomView" class="view">
    <div class="room-head">
      <button id="backToMap" class="small-btn">← Map</button>
      <h2 id="roomTitle">Room</h2>
      <button id="saveBtn" class="small-btn">Save</button>
    </div>
    <div class="room-layout">
      <div class="image-stage room-stage">
        <img id="roomImage" src="" alt="">
        <div id="overlayLayer"></div>
      </div>
      <aside class="side-panel">
        <div id="roomInfo"></div>
        <div id="gameArea"></div>
        <div id="shopArea"></div>
      </aside>
    </div>
  </section>
</section>
<script src="script.js"></script>
</body>
</html>
